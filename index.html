<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Scheduler</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Flatpickr -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HOME PAGE -->
  <div id="home" class="min-h-screen flex flex-col items-center justify-center px-6 text-center bg-gray-950 text-white">

    <h1 class="text-4xl md:text-6xl font-bold mb-6">
      Get ready to gather a Group Scheduling
    </h1>

    <p class="text-gray-300 max-w-xl mb-10 leading-relaxed">
      This is a page where you 
      <span class="text-sky-400">save</span> time when opening a group event.
    </p>

    <div class="flex gap-4">
      <button 
        class="bg-sky-500 hover:bg-sky-600 text-white px-6 py-3 rounded-lg shadow-md transition"
        onclick="goToCalendar()">
        Get started
      </button>

      <button 
        class="text-gray-300 hover:text-white px-6 py-3 transition"
        onclick="alert('Show info page later')">
        Learn more →
      </button>
    </div>

  </div>

  <!-- PICKING TIME PAGE -->
  <div id="picking-time" class="hidden min-h-screen bg-gray-900 text-white p-8">

    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">

      <!-- LEFT: Calendar -->
      <div class="md:col-span-1 bg-gray-800 p-6 rounded-lg shadow-lg">
        <h2 class="text-xl font-bold mb-4">Select a Date</h2>
        <input id="datePicker" class="text-black w-full px-3 py-2 rounded" />
      </div>

      <!-- RIGHT: Time Selection -->
      <div class="md:col-span-3 bg-gray-800 p-6 rounded-lg shadow-lg">
        <h2 id="selectedDate" class="text-2xl font-bold mb-4">Choose a time</h2>

        <div id="timeSlots" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

        <button 
          class="mt-6 bg-sky-500 hover:bg-sky-600 text-white px-6 py-3 rounded-lg shadow-md transition"
          onclick="saveAvailability()">
          Save Availability
        </button>
      </div>

    </div>

  </div>


  <script src="script.js"></script>

</body>
</html>
